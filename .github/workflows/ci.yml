name: ci

on:
  push:
    branches: ['**']
    tags: ['v*', '[0-9]*']
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup component add rustfmt
      - run: cargo fmt --check --verbose

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y libudev-dev
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: clippy-${{ hashFiles('Cargo.lock') }}
          restore-keys: clippy-
      - run: rustup component add clippy
      - run: cargo clippy --all-targets -- -D warnings

  release:
    runs-on: ubuntu-latest
    needs: [fmt, clippy]
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y libudev-dev
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-${{ hashFiles('Cargo.lock') }}
          restore-keys: release-
      - run: cargo build --release
      - name: package
        run: |
          strip target/release/egctl
          mkdir -p dist
          cp target/release/egctl dist/egctl-linux-x86_64
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/egctl-linux-x86_64
